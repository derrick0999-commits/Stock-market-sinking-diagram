<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <title>青雲(5386) 沉沒模擬器</title>
  <meta name="description" content="即時沉沒模擬器 — 把套牢深度變成海洋垂直剖面，嘲諷友人的投資沉沒現況。">
  <meta name="theme-color" content="#0a2840">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="沉沒模擬器">
  <script>
    (function () {
      var path = location.pathname;
      var marker = "Stock-market-sinking-diagram";
      var idx = path.indexOf(marker);
      var base = idx >= 0
        ? path.slice(0, idx + marker.length) + "/"
        : (path.endsWith("/") ? path : path.replace(/[^/]+$/, "") || "/");
      if (!base.endsWith("/")) base += "/";
      var el = document.createElement("base");
      el.href = base;
      document.head.appendChild(el);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
  <link rel="apple-touch-icon" href="apple-touch-icon.png?v=4">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=4">
  <link rel="apple-touch-icon-precomposed" href="apple-touch-icon-precomposed.png?v=4">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="stylesheet" href="css/style.css?v=11">
</head>
<body>
  <div class="page">
    <header class="sim-header">
      <div class="sim-brand">
        <p class="sim-kicker">5386.TWO · 即時沉沒模擬器</p>
        <h1 class="sim-title">青雲<span class="sim-aside">平步向下</span></h1>
      </div>
      <blockquote class="captain-quote" id="captain-quote">船長正在翻航海日誌…</blockquote>
    </header>

    <section class="ocean-panel" aria-label="海洋垂直剖面">
      <div class="ocean-meta">
        <p class="ocean-label">處損深度 <strong id="depth-pct">—</strong>%</p>
        <p class="ocean-sub" id="ocean-sub">載入中…</p>
      </div>
      <div class="ocean-frame">
        <canvas id="ocean-canvas" aria-label="下潛軌跡與船位"></canvas>
        <div class="milestone-rail" id="milestone-rail" aria-hidden="true"></div>
      </div>
    </section>

    <section class="metric-strip" aria-label="即時損益">
      <div class="metric-main">
        <span class="metric-label">累計虧損 · 總報酬</span>
        <span class="metric-value"><span id="loss-amount">—</span><small>元</small></span>
        <span class="metric-sub">收盤 <span id="close-price">—</span> · 解套線 <span id="breakeven-price">—</span></span>
      </div>
    </section>

    <section class="cruel-panel" aria-label="殘酷儀表板">
      <h2 class="panel-title">殘酷儀表板</h2>
      <div class="cruel-grid">
        <article class="cruel-card">
          <span class="cruel-label">要解套還需漲</span>
          <span class="cruel-value">+<span id="need-rise">—</span>%</span>
        </article>
        <article class="cruel-card">
          <span class="cruel-label">股利年化殖利率</span>
          <span class="cruel-value"><span id="div-yield">—</span>%</span>
        </article>
        <article class="cruel-card">
          <span class="cruel-label">只靠股利回本</span>
          <span class="cruel-value"><span id="div-years">—</span> 年</span>
        </article>
      </div>
    </section>

    <section class="action-bar">
      <button type="button" class="btn-share" id="btn-share">生成分享卡 PNG</button>
      <button type="button" class="btn-roast" id="btn-roast" aria-label="點此點名套牢乘客">點名套牢乘客 · 彩蛋</button>
    </section>

    <div class="roast-layer" id="roast-layer" hidden aria-live="polite">
      <div class="roast-ship-wrap">
        <svg class="roast-ship" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <g fill="#101820" stroke="#e8f4fb" stroke-width="1.4" stroke-linejoin="round">
            <g transform="translate(255,86)"><circle cx="0" cy="-20" r="6.2"/><path d="M0,-13 v20 M0,-6 l-10,7 M0,-6 l11,-11 M0,7 l-7,13 M0,7 l7,13" fill="none" stroke-width="3.2" stroke-linecap="round"/></g>
            <g transform="translate(365,90)"><circle cx="0" cy="-18" r="5.6"/><path d="M0,-11 v16 M0,-4 l-12,-2 M0,-4 l12,-2 M0,5 l-6,12 M0,5 l8,11" fill="none" stroke-width="3.1" stroke-linecap="round"/></g>
            <g transform="translate(475,96)"><circle cx="0" cy="-11" r="5.2"/><path d="M0,-5 v9 M0,0 l-9,4 M0,0 l9,3 M0,4 l-8,9 M0,4 l9,8" fill="none" stroke-width="3" stroke-linecap="round"/></g>
            <g transform="translate(720,72)"><circle cx="0" cy="-15" r="5.6"/><path d="M0,-8 v18 M0,-1 l-9,11 M0,-1 l9,11 M0,10 l-5,11 M0,10 l6,11" fill="none" stroke-width="3" stroke-linecap="round"/></g>
            <g transform="translate(205,146)"><circle cx="0" cy="-13" r="5.2"/><path d="M0,-7 v14 M0,-1 l-10,6 M0,-1 l10,6 M0,7 l-6,10 M0,7 l7,10" fill="none" stroke-width="2.9" stroke-linecap="round"/></g>
          </g>
        </svg>
        <div class="roast-bubbles" id="roast-bubbles"></div>
      </div>
      <p class="roast-line" id="roast-line"></p>
    </div>

    <footer class="footer">
      <p>每日台北收盤後更新 · 僅供娛樂 · 海面＝解套線（還原均價）</p>
    </footer>
  </div>

  <canvas id="share-canvas" width="1080" height="1350" hidden aria-hidden="true"></canvas>
  <script src="js/app.js?v=11"></script>
</body>
</html>

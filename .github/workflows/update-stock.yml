name: Update Stock Price

on:
  schedule:
    # Taipei 15:30 = UTC 07:30 (weekdays)
    - cron: "30 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch stock price and update history
        run: python scripts/fetch_price.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/price-history.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update stock price for $(date -u +%Y-%m-%d)"
            git push
          fi
